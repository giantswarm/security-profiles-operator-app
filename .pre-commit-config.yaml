minimum_pre_commit_version: '2.17'
default_install_hook_types: [pre-commit, commit-msg]
repos:
  # base hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: detect-private-key
      - id: end-of-file-fixer
        exclude: "(.*testdata/.*|^\\.yarn/.*)"
      - id: mixed-line-ending
      - id: trailing-whitespace
        exclude: "(.*testdata/.*|^\\.yarn/.*)"

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [--strict]

  # Helm chart hooks for security-profiles-operator
  - repo: https://github.com/losisin/helm-values-schema-json
    rev: v2.5.0
    hooks:
      - id: helm-schema
        args:
          - --config
          - helm/security-profiles-operator/.schema.yaml
  - repo: https://github.com/giantswarm/schemalint
    rev: v2.6.1
    hooks:
      - id: schemalint-normalize
        args:
          - helm/security-profiles-operator/values.schema.json
          - -o
          - helm/security-profiles-operator/values.schema.json
          - --force
      - id: schemalint-verify
        args:
          - helm/security-profiles-operator/values.schema.json
  - repo: https://github.com/norwoodj/helm-docs
    rev: "v1.14.2"
    hooks:
      - id: helm-docs
        args:
          - --chart-search-root=helm
          - --sort-values-order=file
